name: Secure CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build-and-test:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Run Tests
      run: npm test || true

    - name: Dependency Security Scan
      run: npm audit --audit-level=high || true